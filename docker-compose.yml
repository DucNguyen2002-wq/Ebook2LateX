services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env          # DATABASE_URL trỏ tới Supabase Cloud
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Proxy /api/* → backend khi chạy Docker
      API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  uploads_data:
